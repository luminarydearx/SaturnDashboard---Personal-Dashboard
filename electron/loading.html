<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saturn Dashboard — Loading</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background: #04040d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e2e8f0;
    user-select: none;
  }

  /* Stars background */
  .stars { position:fixed; inset:0; overflow:hidden; }
  .star  { position:absolute; background:white; border-radius:50%; animation: twinkle var(--d,3s) ease-in-out infinite; animation-delay:var(--delay,0s); }
  @keyframes twinkle { 0%,100%{opacity:1} 50%{opacity:.1} }

  /* Logo */
  .logo-wrap { position:relative; width:72px; height:72px; margin-bottom:20px; }
  .logo-img  { width:72px; height:72px; filter:drop-shadow(0 0 16px rgba(124,58,237,0.8)); }
  .ring {
    position:absolute; inset:-10px; border-radius:50%;
    border: 2px solid transparent;
    border-top-color: #7c3aed;
    border-right-color: #06b6d480;
    animation: spin 1.5s linear infinite;
  }
  .ring2 {
    position:absolute; inset:-18px; border-radius:50%;
    border: 1px solid transparent;
    border-bottom-color: #06b6d4;
    border-left-color: #7c3aed40;
    animation: spin 2.5s linear infinite reverse;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Text */
  h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .sub { font-size: 11px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }

  /* Progress */
  .bar-wrap { width:180px; height:3px; background:rgba(255,255,255,0.06); border-radius:99px; overflow:hidden; }
  .bar-fill  { height:100%; background:linear-gradient(90deg,#7c3aed,#06b6d4); border-radius:99px; animation: load 2s ease-in-out infinite; }
  @keyframes load { 0%{width:0%;margin-left:0} 50%{width:70%;margin-left:15%} 100%{width:0%;margin-left:100%} }

  .status { margin-top:14px; font-size:11px; color:#64748b; letter-spacing:0.5px; }
  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay:.2s; }
  .dot:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="logo-wrap">
  <div class="ring2"></div>
  <div class="ring"></div>
  <!-- Saturn ring SVG approximation -->
  <svg class="logo-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="pg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#06b6d4"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="50" r="26" fill="url(#pg)" opacity="0.9"/>
    <ellipse cx="50" cy="50" rx="44" ry="10" fill="none" stroke="url(#pg)" stroke-width="4" opacity="0.5"/>
    <circle cx="50" cy="50" r="12" fill="#7c3aed" opacity="0.6"/>
  </svg>
</div>

<h1>Saturn</h1>
<p class="sub">Dashboard</p>

<div class="bar-wrap"><div class="bar-fill"></div></div>
<p class="status">Starting server<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>

<script>
  // Generate stars
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${0.3+Math.random()*0.7}`;
    c.appendChild(s);
  }

  // Rotate status text
  const msgs = ['Starting server', 'Loading modules', 'Preparing dashboard', 'Almost ready'];
  let idx = 0;
  setInterval(() => {
    idx = (idx+1) % msgs.length;
    document.querySelector('.status').innerHTML = msgs[idx] + '<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
  }, 2500);
</script>
</body>
</html>
