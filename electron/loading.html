<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saturn — Loading</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    color: #e2e8f0;
    user-select: none; -webkit-user-select: none;
  }

  /* Outer card */
  .card {
    width: 320px;
    background: rgba(4, 4, 13, 0.96);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 20px;
    padding: 32px 28px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    box-shadow:
      0 32px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(124,58,237,0.08),
      inset 0 1px 0 rgba(255,255,255,0.04);
    animation: fadeIn .3s ease-out;
  }

  /* Logo orbit rings */
  .orbit-wrap {
    position: relative; width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
  }
  .ring {
    position: absolute; border-radius: 50%; border: 1.5px solid transparent;
  }
  .ring-1 { inset:-14px; border-color: rgba(124,58,237,0.3); animation: spin 8s linear infinite; }
  .ring-2 { inset:-8px;  border-color: rgba(6,182,212,0.2);  animation: spin 5s linear infinite reverse; }
  .ring-3 { inset:-22px; border-style: dashed; border-color: rgba(124,58,237,0.12); animation: spin 14s linear infinite; }
  .orbit-dot {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: #7c3aed;
    box-shadow: 0 0 8px #7c3aed;
    top: -3px; left: 50%; transform: translateX(-50%);
    animation: orbit 5s linear infinite;
  }

  /* Saturn logo text */
  .sat-title {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.55em;
    color: rgba(124,58,237,0.8);
    text-transform: uppercase;
  }

  /* Status text */
  .status {
    font-size: 12px; color: rgba(148,163,184,0.7);
    letter-spacing: 0.05em; text-align: center;
    min-height: 18px;
    transition: opacity .3s;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%; height: 3px; border-radius: 99px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    background: linear-gradient(to right, #7c3aed, #06b6d4);
    animation: progress 2.5s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(124,58,237,0.5);
  }

  /* Dots */
  .dots { display:flex; gap:6px; align-items:center; }
  .dot  { width:5px; height:5px; border-radius:50%; background:#7c3aed; animation: bounce .9s ease-in-out infinite; opacity:.5; }
  .dot:nth-child(2) { animation-delay:.15s; background:#8b5cf6; }
  .dot:nth-child(3) { animation-delay:.3s;  background:#06b6d4; }

  @keyframes spin     { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes orbit    { from{transform:translateX(-50%) rotate(0) translateY(-29px) rotate(0)} to{transform:translateX(-50%) rotate(360deg) translateY(-29px) rotate(-360deg)} }
  @keyframes progress { 0%{width:0%;opacity:1} 60%{width:85%;opacity:1} 80%{width:88%;opacity:0.7} 100%{width:0%;opacity:0} }
  @keyframes bounce   { 0%,100%{transform:translateY(0);opacity:.5} 50%{transform:translateY(-5px);opacity:1} }
  @keyframes fadeIn   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
  <div class="card">
    <!-- Logo orbit -->
    <div class="orbit-wrap">
      <div class="ring ring-3"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="orbit-dot"></div>
      <!-- Minimal Saturn icon (SVG) -->
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="position:relative;z-index:2;filter:drop-shadow(0 0 12px rgba(124,58,237,0.8))">
        <circle cx="20" cy="20" r="12" fill="url(#sg)" />
        <ellipse cx="20" cy="20" rx="20" ry="5" fill="none" stroke="url(#sg2)" stroke-width="1.5" opacity=".6"/>
        <defs>
          <linearGradient id="sg" x1="8" y1="8" x2="32" y2="32">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
          <linearGradient id="sg2" x1="0" y1="0" x2="40" y2="0">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
            <stop offset="50%" stop-color="#06b6d4"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Title -->
    <div style="text-align:center">
      <p class="sat-title">Saturn</p>
      <p style="font-size:9px;color:rgba(100,116,139,0.5);letter-spacing:0.3em;margin-top:3px;text-transform:uppercase">Dashboard</p>
    </div>

    <!-- Status -->
    <p class="status" id="status">Starting server…</p>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <!-- Dots -->
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    const msgs = [
      'Starting server…',
      'Loading modules…',
      'Compiling routes…',
      'Establishing connection…',
      'Almost ready…',
    ];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % msgs.length;
      document.getElementById('status').textContent = msgs[i];
    }, 1800);
  </script>
</body>
</html>
